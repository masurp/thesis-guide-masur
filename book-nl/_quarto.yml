project:
  type: book
  output-dir: ../_book/nl

book:
  title: "MA Scriptiegids"
  subtitle: "Communicatiewetenschap · Vrije Universiteit Amsterdam"
  author: "Philipp Masur"
  affiliation: "Vrije Universiteit Amsterdam"
  date: today
  date-format: "D MMMM YYYY"
  language: nl
  repo-url: https://github.com/masurp/thesis-guide-masur
  repo-actions: [issue]
  search: true

  navbar:
    logo: ../../img/logo.png
    logo-alt: "VU Amsterdam"
    title: false
    right:
      - text: "🇬🇧 English"
        href: ../../index.html

  sidebar:
    style: docked
    search: true

  chapters:
    - index.qmd
    - part: "Aan de slag"
      chapters:
        - getting-started.qmd
        - trajectory.qmd
        - timeline.qmd
        - supervision.qmd
    - part: "Het onderzoeksproces"
      chapters:
        - research-question.qmd
        - research-design.qmd
        - ethics.qmd
        - thesis-plan.qmd
        - research-proposal.qmd
    - part: "De scriptie schrijven"
      chapters:
        - thesis-structure.qmd
        - writing-intro-theory.qmd
        - writing-method.qmd
        - writing-results.qmd
        - writing-discussion.qmd
    - part: "Academische praktijken"
      chapters:
        - ai-tools.qmd
        - literature.qmd
        - citation.qmd
        - open-science.qmd
        - r-resources.qmd
    - part: "Inleveren & afstuderen"
      chapters:
        - assessment.qmd
        - graduation.qmd

format:
  html:
    theme: [cosmo, ../../theme/theme.scss]
    toc: true
    toc-depth: 3
    link-external-icon: true
    link-external-newwindow: true

bibliography: references.bib
csl: ../../theme/apa.csl
